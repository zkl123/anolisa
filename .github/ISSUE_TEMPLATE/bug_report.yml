name: Bug Report
description: Report a bug to help us improve
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Select the affected component below — the title will be prefixed automatically.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - cosh
        - sec-core
        - skill
        - sight
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following information:
        - OS: [e.g. Anolis OS 8, Ubuntu 22.04]
        - Component version: [e.g. cosh v2.1.0]
        - Node.js version (if applicable): [e.g. 20.11.0]
        - Python version (if applicable): [e.g. 3.12.3]
        - Rust version (if applicable): [e.g. 1.80.0]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
