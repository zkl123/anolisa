###############################################################################
# Issue Triage — Assign maintainers and send notifications
#
# Triggered when a component:xxx label is added to an issue.
# Works for both auto-labeling (via issue-automation.yml) and manual labeling.
#
# Maintainer routing is configured in .github/maintainers.json.
# No checkout or external tools required — config is fetched via GitHub API.
###############################################################################

name: 🔀 Issue Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  assign-and-notify:
    name: 📌 Assign & Notify Maintainers
    runs-on: ubuntu-22.04
    if: startsWith(github.event.label.name, 'component:')

    steps:
      # -----------------------------------------------------------------------
      # Fetch maintainers.json via API, resolve maintainers, assign + comment
      # No checkout or yq needed.
      # -----------------------------------------------------------------------
      - name: 🔍 Resolve, assign and comment
        id: triage
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            const scopeName = label.replace('component:', '');

            // Fetch maintainers.json from the repository via API
            const { data } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/maintainers.json',
            });
            const config = JSON.parse(Buffer.from(data.content, 'base64').toString());

            // Resolve maintainers for this label, fall back to default
            const scope = config.scopes.find(s => s.label === label);
            const entries = scope ? scope.maintainers : config.default.maintainers;
            const maintainers = entries.map(e => e.github);

            if (maintainers.length === 0) {
              console.log('No maintainers configured — skipping.');
              return;
            }

            console.log(`Assigning: ${maintainers.join(', ')}`);
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: maintainers,
            });

            const mentionList = maintainers.map(m => `@${m}`).join(' ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## 🔀 Issue Triage`,
                ``,
                `This issue has been automatically assigned to **${mentionList}** ` +
                `as the maintainer(s) of \`${scopeName}\`.`,
                ``,
                `> Maintainers, please review and triage this issue. ` +
                `Set a priority label and update the status as needed. Thanks! 🙏`,
              ].join('\n'),
            });

            core.setOutput('maintainers', maintainers.join(','));

      # -----------------------------------------------------------------------
      # Email notification (skipped if MAIL_TO / MAIL_SERVER secrets are absent)
      # -----------------------------------------------------------------------
      - name: 📧 Check email configuration
        if: steps.triage.outputs.maintainers != ''
        id: mail-check
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
        run: |
          if [ -n "$MAIL_TO" ] && [ -n "$MAIL_SERVER" ]; then
            echo "mail_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "Email secrets not configured — skipping"
          fi

      - name: 📧 Send email notification
        if: steps.mail-check.outputs.mail_configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[ANOLISA] New Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: "ANOLISA Bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            # New Issue Notification

            **Repository**: ${{ github.repository }}
            **Issue**: #${{ github.event.issue.number }}
            **Title**: ${{ github.event.issue.title }}
            **Label**: ${{ github.event.label.name }}
            **Assigned to**: ${{ steps.triage.outputs.maintainers }}
            **Opened by**: ${{ github.event.issue.user.login }}

            **Link**: ${{ github.event.issue.html_url }}

            > This email was sent automatically by the ANOLISA Issue Triage Bot.
          convert_markdown: true

      # -----------------------------------------------------------------------
      # DingTalk Webhook notification (skipped if secrets are absent)
      # -----------------------------------------------------------------------
      - name: 🔔 Send DingTalk notification
        if: steps.triage.outputs.maintainers != ''
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ] || [ -z "$DINGTALK_SECRET" ]; then
            echo "DingTalk webhook not configured — skipping"
            exit 0
          fi

          TIMESTAMP=$(date +%s%3N)
          STRING_TO_SIGN="${TIMESTAMP}\n${DINGTALK_SECRET}"
          SIGN=$(echo -ne "$STRING_TO_SIGN" \
            | openssl dgst -sha256 -hmac "$DINGTALK_SECRET" -binary \
            | base64)
          ENCODED_SIGN=$(python3 -c "import urllib.parse; print(urllib.parse.quote_plus('$SIGN'))")
          WEBHOOK_URL="${DINGTALK_WEBHOOK}&timestamp=${TIMESTAMP}&sign=${ENCODED_SIGN}"

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "msgtype": "markdown",
            "markdown": {
              "title": "New Issue #${{ github.event.issue.number }}",
              "text": "## 🔔 ANOLISA new Issue\n\n**Issue**: [#${{ github.event.issue.number }} ${{ github.event.issue.title }}](${{ github.event.issue.html_url }})\n\n**组件**: \`${{ github.event.label.name }}\`\n\n**提交者**: ${{ github.event.issue.user.login }}\n\n**负责人**: ${{ steps.triage.outputs.maintainers }}\n\n> 🤖 ANOLISA Issue Triage Bot"
            }
          }
          EOF
          echo "DingTalk notification sent"
